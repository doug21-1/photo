<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }

        /* Alteração 1: Novo estilo css para a moldura oficial */
        #moldura-oficial {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            object-fit: cover;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-ios {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #log-erro {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 12px;
            font-weight: bold;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <!-- Alteração 4: Parâmetros extras para compatibilidade com iPhone 14, 15 e 16 -->
        <video
            id="video"
            autoplay
            muted
            playsinline
            webkit-playsinline>
        </video>
        <!-- Alteração 1: Forçando quebra de cache na url da imagem -->
        <img id="moldura-oficial" src="./borda.png?v=1" alt="Moldura Junina">
    </div>

    <button id="tirar-foto" disabled>⌛ Carregando Moldura...</button>
    <div id="log-erro"></div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-ios">💡 <b>No iPhone:</b> Toque e segure o dedo em cima da foto para clicar em <b>"Salvar em Fotos"</b>.</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const logErro = document.getElementById('log-erro');
        const imgMoldura = document.getElementById('moldura-oficial');

        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            logErro.innerHTML = "⚠️ Atenção: A câmera só funcionará se o site for publicado em um link seguro 'https://'.";
        }

        // Alteração 5: Melhoria na inicialização da câmera para o ecossistema iPhone
        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: {
                            ideal: "user"
                        }
                    },
                    audio: false
                });

                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Não foi possível acessar a câmera. Verifique as permissões do navegador.";
                btnTirarFoto.disabled = true;
            }
        }

        // Alteração 2: Carregamento monitorado por metadados para iPhones lentos
        window.addEventListener('load', async () => {
            await iniciarCamera();

            video.addEventListener('loadedmetadata', () => {
                btnTirarFoto.disabled = false;
                btnTirarFoto.innerHTML = "📸 Tirar Foto!";
            });
        });

        // Alteração 3: Evento do botão corrigido com validação do readyState e posicionamento dinâmico
        btnTirarFoto.addEventListener('click', async () => {
            if (
                !video.videoWidth ||
                !video.videoHeight ||
                video.readyState < 2
            ) {
                alert("A câmera ainda está iniciando. Aguarde alguns segundos.");
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;

            canvas.width = vw;
            canvas.height = vh;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(video, 0, 0, vw, vh);

            if (imgMoldura.complete && imgMoldura.naturalWidth > 0) {
                ctx.drawImage(imgMoldura, 0, 0, vw, vh);
            }

            try {
                const dataUrl = canvas.toDataURL("image/png");

                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";

                setTimeout(() => {
                    resultadoDiv.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });
                }, 200);

            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Erro ao gerar a foto. Tente novamente.";
            }
        });
    </script>
</body>
</html>
