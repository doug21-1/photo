<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* O vídeo ocupa o fundo com z-index menor */
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
            z-index: 1;
        }

        /* SOLUÇÃO PARA IPHONE: A moldura vira um background CSS para não travar a câmera atrás */
        #moldura-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            background-image: url('./borda.png?v=2');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-ios {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #log-erro {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 12px;
            font-weight: bold;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <!-- Removida a tag img que bloqueia o iOS; inserida div de cobertura -->
        <div id="moldura-overlay"></div>
    </div>

    <button id="tirar-foto" disabled>📸 Tirar Foto!</button>
    <div id="log-erro"></div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-ios">💡 <b>No iPhone:</b> Toque e segure o dedo em cima da foto para clicar em <b>"Salvar em Fotos"</b>.</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <!-- Objeto de imagem fantasma carregado em memória apenas para a fusão do Canvas JavaScript -->
    <img id="borda-hidden" src="./borda.png?v=2" style="display: none;">

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const logErro = document.getElementById('log-erro');
        const imgHidden = document.getElementById('borda-hidden');

        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            logErro.innerHTML = "⚠️ Atenção: A câmera só funcionará se o site for publicado em um link seguro 'https://'.";
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                btnTirarFoto.disabled = false;
            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Não foi possível acessar a câmera. Verifique as permissões de privacidade do seu navegador.";
                btnTirarFoto.disabled = true;
            }
        }

        window.addEventListener('load', () => {
            iniciarCamera();
        });

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || 640;
            const vh = video.videoHeight || 480;

            // Garante o tamanho exato nativo da captura para o download
            canvas.width = vw;
            canvas.height = vh;

            const ctx = canvas.getContext('2d');

            // 1. Renderiza o feed de vídeo primeiro
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Sobrepõe a imagem na memória mantendo a proporção exata da foto original
            if (imgHidden.complete && imgHidden.naturalWidth > 0) {
                const fitaMoldura = imgHidden.naturalWidth / imgHidden.naturalHeight;
                const fitaCanvas = vw / vh;
                let dWidth, dHeight, dx, dy;

                if (fitaMoldura > fitaCanvas) {
                    dHeight = vh;
                    dWidth = vh * fitaMoldura;
                    dx = (vw - dWidth) / 2;
                    dy = 0;
                } else {
                    dWidth = vw;
                    dHeight = vw / fitaMoldura;
                    dx = 0;
                    dy = (vh - dHeight) / 2;
                }
                ctx.drawImage(imgHidden, dx, dy, dWidth, dHeight);
            }

            // 3. Exporta mantendo a mesma resolução nativa
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";

                setTimeout(() => {
                    resultadoDiv.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });
                }, 200);

            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Erro ao gerar a foto. Tente novamente.";
            }
        });
    </script>
</body>
</html>
