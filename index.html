<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- DECORAÇÃO JUNINA FEITA 100% EM CSS --- */
        #decoracao-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Varal de Bandeirinhas Coloridas no Topo */
        .varal {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
        }
        .bandeirinha {
            width: 25px;
            height: 35px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 75%, 0% 100%);
        }
        .b1 { background: #d32f2f; }
        .b2 { background: #ffeb3b; }
        .b3 { background: #00e676; }
        .b4 { background: #29b6f6; }
        .b5 { background: #ff7043; }

        /* Placa com o Nome da Festa */
        .placa-festa {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            background: #baf310;
            background-image: linear-gradient(135deg, #8bc34a, #afb42b);
            color: #d32f2f;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 10px;
            border: 3px dashed #d32f2f;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Cerquinha de Madeira Caipira na Base */
        .cerca-base {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: transparent;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
        }
        .madeira {
            width: 18px;
            height: 100%;
            background: #8d6e63;
            border: 2px solid #5d4037;
            border-radius: 4px 4px 0 0;
            clip-path: polygon(0% 25%, 50% 0%, 100% 25%, 100% 100%, 0% 100%);
        }
        .viga-horizontal {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            height: 12px;
            background: #795548;
            border-top: 2px solid #5d4037;
            border-bottom: 2px solid #5d4037;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }
        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }
        #resultado { margin-top: 25px; display: none; }
        #foto-final { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .aviso-salvar { font-size: 14px; color: #555; margin-top: 10px; padding: 0 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        
        <!-- Elementos caipiras virtuais ativos em tempo real na tela -->
        <div id="decoracao-overlay">
            <div class="varal">
                <div class="bandeirinha b1"></div>
                <div class="bandeirinha b2"></div>
                <div class="bandeirinha b3"></div>
                <div class="bandeirinha b4"></div>
                <div class="bandeirinha b5"></div>
                <div class="bandeirinha b1"></div>
                <div class="bandeirinha b2"></div>
                <div class="bandeirinha b3"></div>
            </div>
            
            <div class="placa-festa">6ª EDIÇÃO 🌽 ARRAIÁ DA EMILIANO MANOJO</div>
            
            <div class="cerca-base">
                <div class="viga-horizontal"></div>
                <div class="madeira"></div><div class="madeira"></div><div class="madeira"></div>
                <div class="madeira"></div><div class="madeira"></div><div class="madeira"></div>
                <div class="madeira"></div><div class="madeira"></div><div class="madeira"></div>
                <div class="madeira"></div><div class="madeira"></div><div class="madeira"></div>
                <div class="madeira"></div><div class="madeira"></div><div class="madeira"></div>
            </div>
        </div>
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 No iPhone, segure o dedo na foto e toque em "Salvar em Fotos" para guardar na galeria.</p>
        <a id="baixar-foto" download="arraia-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                btnTirarFoto.disabled = false;
                btnTirarFoto.innerHTML = "📸 Tirar Foto!";
            } catch (err) {
                alert("Por favor, ative as permissões de câmera do navegador.");
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || 640;
            const vh = video.videoHeight || 480;

            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Tira o print do rosto da pessoa
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. O código carimba os elementos juninos matematicamente por cima da foto no download
            // Desenha o Varal de Bandeirinhas
            const qtdBands = 8;
            const largBand = vw / qtdBands;
            const altBand = vh * 0.07;
            const cores = ["#d32f2f", "#ffeb3b", "#00e676", "#29b6f6", "#ff7043"];

            for (let i = 0; i < qtdBands; i++) {
                ctx.fillStyle = cores[i % cores.length];
                ctx.beginPath();
                ctx.moveTo(i * largBand, 10);
                ctx.lineTo((i + 1) * largBand, 10);
                ctx.lineTo((i + 1) * largBand, 10 + altBand);
                ctx.lineTo((i + 0.5) * largBand, 10 + (altBand * 0.75));
                ctx.lineTo(i * largBand, 10 + altBand);
                ctx.closePath();
                ctx.fill();
            }

            // Desenha a Placa do Letreiro Caipira
            const largPlaca = vw * 0.85;
            const altPlaca = vh * 0.08;
            const xPlaca = (vw - largPlaca) / 2;
            const yPlaca = vh * 0.12;

            ctx.fillStyle = "#afb42b";
            ctx.fillRect(xPlaca, yPlaca, largPlaca, altPlaca);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#d32f2f";
            ctx.setLineDash([6, 6]); // Linha tracejada caipira
            ctx.strokeRect(xPlaca, yPlaca, largPlaca, altPlaca);
            ctx.setLineDash([]); // Reseta estilo de linha

            // Escreve o Nome da Festa na foto de download
            ctx.fillStyle = "#d32f2f";
            ctx.font = `bold ${Math.floor(altPlaca * 0.45)}px -apple-system, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("6ª EDIÇÃO 🌽 ARRAIÁ DA EMILIANO MANOJO", vw / 2, yPlaca + (altPlaca / 2));

            // Desenha a Cerquinha de Madeira na Base
            const altCerca = vh * 0.10;
            const yCerca = vh - altCerca;

            // Viga horizontal da cerca
            ctx.fillStyle = "#795548";
