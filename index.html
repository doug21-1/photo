<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* A imagem em Base64 fica fixada exatamente por cima da gravação */
        #moldura-oficial {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            object-fit: cover;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #painel-status {
            background-color: #ffebee;
            color: #c62828;
            font-size: 14px;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <img id="moldura-oficial" src="" alt="Moldura Junina">
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>
    <div id="painel-status">Status: Inicializando sistema...</div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 Se o download direto falhar no iPhone, segure o dedo na foto e toque em "Salvar em Fotos".</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const painelStatus = document.getElementById('painel-status');
        const imgMoldura = document.getElementById('moldura-oficial');

        // Seu código Base64 oficial injetado de forma nativa e encurtada
        imgMoldura.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAg0AAALpCAIAAAC/r4JXAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAEnQAABJ0Ad5mH3gAAP+lSURBVHheRPwFWNvZ8j+Op17c3TUhxAMJTnBLSIKEQAgkgbgSgeDuVrxI3UtLjZaWUuruttvudt337l7be3ev8x+6n+/vv8/rOc+cOXPmzNvmNQN0EYYoWz3VrickO2RTjaIh2AOij7LWRNvpoWy3FyhBjVxVlY4h30Mc61sS7maKdTVRHHdHWHOVcQ3XSkWy0REuAGr9dS7QGaEi2KoK1gmAlw2wHSLHbK9FbKjEWwrCt5WHbKrBWIrSFALWtInw7P2QjCOUoCyHaSoix5oduA5SGbi5DrVvCWBa2rRS5BZRgUIbcXo625KO2A0AQYSyF4RYwAsR4GwnRrgJnDfZlGAsAP3w7jDzkxnXNeye8sK3c0C3FyM0lqC3c0E2lyG1FIZsLgxBFIRuLAhGcgA0FgevI80fkByDYfv8HmLJ81wWmNyLXB8HwRjD8EHSvdWR7ILLcEdnuiBwPRKbrugDIcEekuCCSnddHQJILguaMSHRcR9x7xNivI8oWEWWHoNggqLaIiN9hhSBbIEhW6yBYIfCWCJwFArsdgd++LgBAg7dAYLavA2uBIMDUal3AgWCJIFojyNaISLt1tzEO64h3Wj8uwQGR5IRIcUKkOiNSXdeDSXVHpLkg0l0RaW6ITO8NGZ6制造人"; // Omitido por questões de tamanho da mensagem, mantenha o código inteiro que você gerou colado aqui dentro das aspas

        async function iniciarCamera() {
            const opcionais = [
                { video: { facingMode: "user" }, audio: false },
                { video: true, audio: false }
            ];

            let stream = null;
            for (let config of opcionais) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(config);
                    if (stream) break;
                } catch (e) {
                    console.log("Sincronizando...", e);
                }
            }

            if (stream) {
                try {
                    video.srcObject = stream;
                    video.play();
                    
                    painelStatus.innerHTML = "✅ Sistema Pronto! A moldura oficial está ativa por cima.";
                    painelStatus.style.backgroundColor = "#e8f5e9";
                    painelStatus.style.color = "#2e7d32";
                    painelStatus.style.borderColor = "#a5d6a7";
                    
                    btnTirarFoto.disabled = false;
                    btnTirarFoto.innerHTML = "📸 Tirar Foto!";
                } catch (playErr) {
                    painelStatus.innerHTML = "Erro de reprodução: " + playErr.message;
                }
            } else {
                painelStatus.innerHTML = "⚠️ Câmera bloqueada. Ative as permissões de privacidade no seu navegador.";
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || video.clientWidth || 640;
            const vh = video.videoHeight || video.clientHeight || 480;

            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Renderiza o rosto (Camada de Baixo)
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Sobrepõe a imagem Base64 de forma proporcional (Camada de Cima)
            if (imgMoldura.complete && imgMoldura.naturalWidth > 0) {
                const fitaMoldura = imgMoldura.naturalWidth / imgMoldura.naturalHeight;
                const fitaCanvas = vw / vh;
                let dWidth, dHeight, dx, dy;

                if (fitaMoldura > fitaCanvas) {
                    dHeight = vh;
                    dWidth = vh * fitaMoldura;
                    dx = (vw - dWidth) / 2;
                    dy = 0;
                } else {
                    dWidth = vw;
                    dHeight = vw / fitaMoldura;
                    dx = 0;
                    dy = (vh - dHeight) / 2;
                }
                ctx.drawImage(imgMoldura, dx, dy, dWidth, dHeight);
            }

            // 3. Exporta mantendo a mesma resolução nativa original da câmera
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                painelStatus.innerHTML = "Erro de buffer ao processar arquivo: " + e.message;
            }
        });
    </script>
</body>
</html>
