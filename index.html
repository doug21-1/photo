<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foto Junina - Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 20px;
        }
        h2 { color: #d32f2f; margin-bottom: 15px; font-weight: bold; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 500px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- ELEMENTOS DA MOLDURA JUNINA CORRIGIDOS --- */
        .elemento-moldura {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* Letreiro Festa Junina centralizado no topo */
        #mol-letreiro {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
        }

        /* Varal de Bandeirinhas logo abaixo do letreiro */
        #mol-bandeirinhas {
            top: 70px;
            left: 0;
            width: 100%;
        }

        /* Cerca com Flores na Base */
        #mol-cerca {
            bottom: 0;
            left: 0;
            width: 100%;
        }

        /* Chapéu de Palha decorativo no canto */
        #mol-chapeu {
            top: 5px;
            right: 5px;
            width: 70px;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-appearance: none; /* Remove estilos padrão do iOS */
        }

        button:hover { background-color: #e64a19; }

        #canvas { display: none; }

        #resultado {
            margin-top: 20px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* Instrução específica exigida para comportamento de salvamento no iPhone */
        .aviso-ios {
            font-size: 14px;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h2>Arraiá Emiliano Manojo 🎉</h2>

    <div id="camera-container">
        <!-- Correção iOS: Atributos 'autoplay', 'playsinline' e 'muted' obrigatórios juntos -->
        <video id="video" autoplay playsinline muted></video>
        
        <!-- Elementos transparentes recortados do seu arquivo -->
        <img id="mol-letreiro" class="elemento-moldura" src="festa-junina-letreiro.png" alt="Letreiro">
        <img id="mol-bandeirinhas" class="elemento-moldura" src="bandeirinhas.png" alt="Bandeirinhas">
        <img id="mol-chapeu" class="elemento-moldura" src="chapeu.png" alt="Chapéu">
        <img id="mol-cerca" class="elemento-moldura" src="cerca-flores.png" alt="Cerca">
    </div>

    <button id="tirar-foto">📸 Tirar Foto!</button>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Olha a chuva! É verdade! 🌽</h3>
        <img id="foto-final" src="" alt="Sua Foto Junina">
        <br>
        <p class="aviso-ios">💡 No iPhone, pressione e segure o dedo na imagem acima para <b>Salvar em Fotos</b>.</p>
        <a id="baixar-foto" download="foto-festa-junina.png"><button>💾 Baixar Minha Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');

        const imgLetreiro = document.getElementById('mol-letreiro');
        const imgBandeirinhas = document.getElementById('mol-bandeirinhas');
        const imgChapeu = document.getElementById('mol-chapeu');
        const imgCerca = document.getElementById('mol-cerca');

        // Configuração de restrição estrita para iOS aceitar a inicialização
        const constraints = {
            video: {
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };

        // Garante que o stream rode corretamente no ecossistema Apple
        navigator.mediaDevices.getUserMedia(constraints)
            .then((stream) => { 
                video.srcObject = stream;
                // Força o play manual caso o iOS bloqueie o autoplay
                video.play().catch(e => console.log("Autoplay bloqueado, aguardando clique."));
            })
            .catch((err) => { 
                alert("Por favor, garanta o acesso à câmera nas configurações do seu Safari."); 
            });

        btnTirarFoto.addEventListener('click', () => {
            // Correção Safari: Verifica se o vídeo está pronto e com dimensões válidas
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                alert("A câmera ainda está carregando os frames. Tente novamente em um segundo.");
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // 1. Renderiza o feed da câmera de forma síncrona
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. Renderiza as sobreposições calculando proporções originais
            // Letreiro
            if (imgLetreiro.complete) {
                let letreiroLargura = canvas.width * 0.85;
                let letreiroAltura = (imgLetreiro.naturalHeight / imgLetreiro.naturalWidth) * letreiroLargura;
                context.drawImage(imgLetreiro, (canvas.width - letreiroLargura) / 2, 30, letreiroLargura, letreiroAltura);
            }

            // Bandeirinhas
            if (imgBandeirinhas.complete) {
                let bandAltura = (imgBandeirinhas.naturalHeight / imgBandeirinhas.naturalWidth) * canvas.width;
                context.drawImage(imgBandeirinhas, 0, 140, canvas.width, bandAltura);
            }

            // Chapéu
            if (imgChapeu.complete) {
                let chapeuLargura = canvas.width * 0.18;
                let chapeuAltura = (imgChapeu.naturalHeight / imgChapeu.naturalWidth) * chapeuLargura;
                context.drawImage(imgChapeu, canvas.width - chapeuLargura - 10, 10, chapeuLargura, chapeuAltura);
            }

            // Cerca
            if (imgCerca.complete) {
                let cercaAltura = (imgCerca.naturalHeight / imgCerca.naturalWidth) * canvas.width;
                context.drawImage(imgCerca, 0, canvas.height - cercaAltura, canvas.width, cercaAltura);
            }

            // 3. Converte para Base64 compatível com Safari
            const dataUrl = canvas.toDataURL('image/png');
            fotoFinal.src = dataUrl;
            linkBaixar.href = dataUrl;
            
            resultadoDiv.style.display = 'block';
            resultadoDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
