<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* A moldura injetada fica perfeitamente fixa por cima do vídeo */
        #moldura-oficial {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            object-fit: cover;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #painel-status {
            background-color: #ffebee;
            color: #c62828;
            font-size: 14px;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        
        <!-- O atributo src agora contém exatamente a string Base64 informada -->
