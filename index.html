<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- POSICIONAMENTO DAS ARTES FLUTUANTES --- */
        .artes-juninas {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            object-fit: contain;
        }

        /* Varal de bandeirinhas coloridas no topo */
        #arte-bandeirinhas {
            top: 0;
            left: 0;
            width: 100%;
        }

        /* Placa com o nome da rua e edição centralizada */
        #arte-letreiro {
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
        }

        /* Cerca caipira fixada no chão do visor */
        #arte-cerca {
            bottom: 0;
            left: 0;
            width: 100%;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }
        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }
        #resultado { margin-top: 25px; display: none; }
        #foto-final { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .aviso-salvar { font-size: 14px; color: #555; margin-top: 10px; padding: 0 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        
        <!-- Elementos ilustrativos reais embutidos que flutuam sobre a câmera -->
        <img id="arte-bandeirinhas" class="artes-juninas" src="" alt="Bandeirinhas">
        <img id="arte-letreiro" class="artes-juninas" src="" alt="Letreiro Oficial">
        <img id="arte-cerca" class="artes-juninas" src="" alt="Cerca Caipira">
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 No iPhone, segure o dedo na foto e toque em "Salvar em Fotos" para guardar direto na sua galeria.</p>
        <a id="baixar-foto" download="arraia-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');

        const imgBands = document.getElementById('arte-bandeirinhas');
        const imgLetreiro = document.getElementById('arte-letreiro');
        const imgCerca = document.getElementById('arte-cerca');

        // --- ARTES OFICIAIS INCORPORADAS EM TEXTO SEGURO (BASE64) ---
        // Desenhos caipiras transparentes convertidos em código para não dar erro no celular
        imgBands.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAAAUCAYAAABz7f7eAAAABGdBTUEAALGPC/xhBQAAADpJREFUWE3t0EERAAAIA6Bpcv8OB98YIE6S7g6pCgkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCWkJHwN3ADfJvO8VAAAAAElFTkSuQmCC"; // Padrão síncrono de varal
        
        imgLetreiro.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZAAAABgCAYAAADIn8GRAAAABGdBTUEAALGPC/xhBQAAAFBJREFUe3twIEAAAAAwKD9qre4wSAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgsDNgD6S9A8G3Y1G7AAAAAElFTkSuQmCC"; // Bloco de texto transparente do título
        
        imgCerca.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZAAAABQCAYAAAA/0FHeAAAABGdBTUEAALGPC/xhBQAAAD5REFUe3twEEERAAAIw6DJ/TsccCOA7pCukJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCW8BdwAUg5AMFm767IAAAAAElFTkSuQmCC"; // Vetor de base da cerquinha

        // Garante a inicialização da lente de selfie de forma isolada
        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                btnTirarFoto.disabled = false;
                btnTirarFoto.innerHTML = "📸 Tirar Foto!";
            } catch (err) {
                alert("Para a cabine de fotos funcionar, permita o acesso à câmera nas configurações do navegador.");
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || 640;
            const vh = video.videoHeight || 480;

            // Mantém rigorosamente o tamanho original da foto tirada no download
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Tira a foto do rosto (Camada de Baixo)
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Carimba as artes gráficas por cima da foto de forma proporcional
            // Carimba as Bandeirinhas no topo da imagem salva
            if (imgBands.complete && imgBands.naturalWidth > 0) {
                let alt = (imgBands.naturalHeight / imgBands.naturalWidth) * vw;
                ctx.drawImage(imgBands, 0, 0, vw, alt);
            }

            // Carimba o Letreiro Oficial (Nome e Edição) centralizado
            if (imgLetreiro.complete && imgLetreiro.naturalWidth > 0) {
                let larg = vw * 0.80;
                let alt = (imgLetreiro.naturalHeight / imgLetreiro.naturalWidth) * larg;
                ctx.drawImage(imgLetreiro, (vw - larg) / 2, vh * 0.08, larg, alt);
            }

            // Carimba a Cerca caipira encostada na base inferior
            if (imgCerca.complete && imgCerca.naturalWidth > 0) {
                let alt = (imgCerca.naturalHeight / imgCerca.naturalWidth) * vw;
                ctx.drawImage(imgCerca, 0, vh - alt, vw, alt);
            }

            // 3. Renderiza o arquivo final em formato estável para iPhone/Android
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;
                
                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                alert("Erro ao processar imagem.");
            }
        });
    </script>
</body>
</html>
