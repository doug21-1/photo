<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- POSICIONAMENTO DOS ELEMENTOS JUNINOS --- */
        .elemento-junino {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* Letreiro Oficial com o nome da rua e edição */
        #mol-letreiro {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
        }

        /* Varal de Bandeirinhas Coloridas */
        #mol-bandeirinhas {
            top: 75px;
            left: 0;
            width: 100%;
        }

        /* Cerca de Madeira com Fogueira na Base */
        #mol-cerca {
            bottom: 0;
            left: 0;
            width: 100%;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        
        <!-- Elementos hospedados online carregando automaticamente por cima da câmera -->
        <img id="mol-letreiro" class="elemento-junino" src="https://ibb.co" alt="Letreiro">
        <img id="mol-bandeirinhas" class="elemento-junino" src="https://ibb.co" alt="Bandeirinhas">
        <img id="mol-cerca" class="elemento-junino" src="https://ibb.co" alt="Cerca">
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 No iPhone, segure o dedo na foto acima e toque em "Salvar em Fotos" para guardar na galeria.</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');

        const imgLetreiro = document.getElementById('mol-letreiro');
        const imgBandeirinhas = document.getElementById('mol-bandeirinhas');
        const imgCerca = document.getElementById('mol-cerca');

        // Inicializa a câmera respeitando a privacidade móvel
        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                btnTirarFoto.disabled = false;
                btnTirarFoto.innerHTML = "📸 Tirar Foto!";
            } catch (err) {
                alert("Por favor, garanta o acesso à câmera nas configurações do seu navegador.");
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || 640;
            const vh = video.videoHeight || 480;

            // Define o canvas para o tamanho nativo do sensor da câmera do celular (Download sem perdas)
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Carimba o rosto da pessoa (Camada de Baixo)
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Funde e sobrepõe os elementos juninos preservando as posições originais da tela (Camada Superior)
            // Desenha o Letreiro Oficial
            if (imgLetreiro.complete && imgLetreiro.naturalWidth > 0) {
                let larg = vw * 0.85;
                let alt = (imgLetreiro.naturalHeight / imgLetreiro.naturalWidth) * larg;
                ctx.drawImage(imgLetreiro, (vw - larg) / 2, vh * 0.03, larg, alt);
            }

            // Desenha as Bandeirinhas
            if (imgBandeirinhas.complete && imgBandeirinhas.naturalWidth > 0) {
                let alt = (imgBandeirinhas.naturalHeight / imgBandeirinhas.naturalWidth) * vw;
                ctx.drawImage(imgBandeirinhas, 0, vh * 0.15, vw, alt);
            }

            // Desenha a Cerca com Fogueira cravada na base inferior
            if (imgCerca.complete && imgCerca.naturalWidth > 0) {
                let alt = (imgCerca.naturalHeight / imgCerca.naturalWidth) * vw;
                ctx.drawImage(imgCerca, 0, vh - alt, vw, alt);
            }

            // 3. Exporta a foto unificada
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                alert("Erro ao mesclar imagens. Garanta que o site esteja rodando em um link HTTPS seguro.");
            }
        });
    </script>
</body>
</html>
