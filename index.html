<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Moldura simulada via CSS por cima da câmera */
        #moldura-visual {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            border: 18px solid #f57c00; /* Borda Laranja */
            box-shadow: inset 0 0 0 4px #ffeb3b; /* Detalhe Amarelo */
        }

        /* Placa Junina gerada via CSS por cima do vídeo */
        .tag-topo {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #d32f2f;
            color: #fff;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 6px;
            z-index: 12;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            border: 2px solid #ffeb3b;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #painel-status {
            background-color: #ffebee;
            color: #c62828;
            font-size: 14px;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <div class="tag-topo">6ª EDIÇÃO 🌽 RUA EMILIANO MANOJO</div>
        <div id="moldura-visual"></div>
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>
    <div id="painel-status">Status: Inicializando sistema...</div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 Se o download direto falhar no iPhone, segure o dedo na foto e toque em "Salvar em Fotos".</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const painelStatus = document.getElementById('painel-status');

        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            painelStatus.innerHTML = "⚠️ ERRO: Câmeras de celular são bloqueadas em links comuns. Publique o site em um endereço seguro 'https://' para o sistema funcionar.";
            painelStatus.style.backgroundColor = "#ffcdd2";
        }

        async function iniciarCamera() {
            const opcionais = [
                { video: { facingMode: "user" }, audio: false },
                { video: true, audio: false }
            ];

            let stream = null;
            for (let config of opcionais) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(config);
                    if (stream) break;
                } catch (e) {
                    console.log("Alternando lente...", e);
                }
            }

            if (stream) {
                try {
                    video.srcObject = stream;
                    video.play();
                    
                    painelStatus.innerHTML = "✅ Sistema Pronto! Posicione o rosto no centro da moldura.";
                    painelStatus.style.backgroundColor = "#e8f5e9";
                    painelStatus.style.color = "#2e7d32";
                    painelStatus.style.borderColor = "#a5d6a7";
                    
                    btnTirarFoto.disabled = false;
                    btnTirarFoto.innerHTML = "📸 Tirar Foto!";
                } catch (playErr) {
                    painelStatus.innerHTML = "Erro de reprodução: " + playErr.message;
                }
            } else {
                painelStatus.innerHTML = "⚠️ Câmera bloqueada. Ative as permissões de privacidade no seu navegador.";
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || video.clientWidth || 640;
            const vh = video.videoHeight || video.clientHeight || 480;

            // Define o canvas para o tamanho nativo do sensor da câmera do celular
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Renderiza o rosto da pessoa capturado do sensor (Camada de baixo)
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Cria e carimba a moldura junina por código diretamente por cima da foto (Camada de cima)
            const espessuraBorda = Math.min(vw, vh) * 0.05;
            
            // Desenha a borda principal laranja
            ctx.lineWidth = espessuraBorda;
            ctx.strokeStyle = "#f57c00"; 
            ctx.strokeRect(espessuraBorda / 2, espessuraBorda / 2, vw - espessuraBorda, vh - espessuraBorda);

            // Desenha o friso interno amarelo
            ctx.lineWidth = espessuraBorda * 0.2;
            ctx.strokeStyle = "#ffeb3b"; 
            ctx.strokeRect(espessuraBorda + (ctx.lineWidth / 2), espessuraBorda + (ctx.lineWidth / 2), vw - (espessuraBorda * 2) - ctx.lineWidth, vh - (espessuraBorda * 2) - ctx.lineWidth);

            // Desenha a Placa de Texto Vermelha no topo
            const larguraPlaca = vw * 0.75;
            const alturaPlaca = vh * 0.07;
            const xPlaca = (vw - larguraPlaca) / 2;
            const yPlaca = vh * 0.06;

            ctx.fillStyle = "#d32f2f"; 
            ctx.fillRect(xPlaca, yPlaca, larguraPlaca, alturaPlaca);
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#ffeb3b";
            ctx.strokeRect(xPlaca, yPlaca, larguraPlaca, alturaPlaca);

            // Adiciona o texto adaptado para a resolução do download
            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${Math.floor(alturaPlaca * 0.45)}px -apple-system, BlinkMacSystemFont, Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("6ª EDIÇÃO 🌽 RUA EMILIANO MANOJO", vw / 2, yPlaca + (alturaPlaca / 2));

            // 3. Junta as duas camadas e gera o link final estável para iPhone e Android
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                painelStatus.innerHTML = "Erro ao processar imagem: " + e.message;
                painelStatus.style.backgroundColor = "#ffcdd2";
                painelStatus.style.color = "#c62828";
            }
        });
    </script>
</body>
</html>
