<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Camada CSS: Força a imagem borda.png a cobrir o visor por cima da lente */
        #moldura-oficial {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            object-fit: cover;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #painel-status {
            background-color: #ffebee;
            color: #c62828;
            font-size: 14px;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <!-- A imagem local é chamada quebrando o cache do navegador mobile -->
        <img id="moldura-oficial" src="./borda.png?v=3" alt="Moldura Junina">
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>
    <div id="painel-status">Status: Inicializando sistema...</div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 Se o download direto falhar no iPhone, segure o dedo na foto e toque em "Salvar em Fotos".</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const painelStatus = document.getElementById('painel-status');
        const imgMoldura = document.getElementById('moldura-oficial');

        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            painelStatus.innerHTML = "⚠️ ERRO: Imagens locais e câmera são bloqueadas sem HTTPS. Publique o site em um link seguro para carregar a borda.";
            painelStatus.style.backgroundColor = "#ffcdd2";
        }

        async function iniciarCamera() {
            const opcionais = [
                { video: { facingMode: "user" }, audio: false },
                { video: true, audio: false }
            ];

            let stream = null;
            for (let config of opcionais) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(config);
                    if (stream) break;
                } catch (e) {
                    console.log("Alternando lente...", e);
                }
            }

            if (stream) {
                try {
                    video.srcObject = stream;
                    video.play();
                    
                    painelStatus.innerHTML = "✅ Sistema Pronto! Tirar foto carregará a moldura de forma síncrona.";
                    painelStatus.style.backgroundColor = "#e8f5e9";
                    painelStatus.style.color = "#2e7d32";
                    painelStatus.style.borderColor = "#a5d6a7";
                    
                    btnTirarFoto.disabled = false;
                    btnTirarFoto.innerHTML = "📸 Tirar Foto!";
                } catch (playErr) {
                    painelStatus.innerHTML = "Erro de reprodução: " + playErr.message;
                }
            } else {
                painelStatus.innerHTML = "⚠️ Câmera bloqueada. Ative as permissões do seu navegador.";
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || video.clientWidth || 640;
            const vh = video.videoHeight || video.clientHeight || 480;

            // Define o tamanho final idêntico ao tamanho original do seu sensor
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Renderiza a foto tirada (Camada de baixo)
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Sobrepõe a imagem 'borda.png' ajustando as proporções nativas no arquivo final
            if (imgMoldura.complete && imgMoldura.naturalWidth > 0) {
                const fitaMoldura = imgMoldura.naturalWidth / imgMoldura.naturalHeight;
                const fitaCanvas = vw / vh;
                let dWidth, dHeight, dx, dy;

                if (fitaMoldura > fitaCanvas) {
                    dHeight = vh;
                    dWidth = vh * fitaMoldura;
                    dx = (vw - dWidth) / 2;
                    dy = 0;
                } else {
                    dWidth = vw;
                    dHeight = vw / fitaMoldura;
                    dx = 0;
                    dy = (vh - dHeight) / 2;
                }
                ctx.drawImage(imgMoldura, dx, dy, dWidth, dHeight);
            }

            // 3. Converte a fusão para exibição segura e download
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                painelStatus.innerHTML = "Erro de buffer ao processar arquivo: " + e.message;
                painelStatus.style.backgroundColor = "#ffcdd2";
                painelStatus.style.color = "#c62828";
            }
        });
    </script>
</body>
</html>
