<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- POSICIONAMENTO DOS ELEMENTOS INDIVIDUAIS --- */
        .elemento-junino {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* Letreiro Festa Junina centralizado no topo */
        #mol-letreiro {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
        }

        /* Varal de Bandeirinhas logo abaixo do letreiro */
        #mol-bandeirinhas {
            top: 75px;
            left: 0;
            width: 100%;
        }

        /* Cerca com Flores e Fogueira na Base */
        #mol-cerca {
            bottom: 0;
            left: 0;
            width: 100%;
        }

        /* Chapéu de Palha decorativo no canto superior direito */
        #mol-chapeu {
            top: 5px;
            right: 5px;
            width: 65px;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #painel-status {
            background-color: #ffebee;
            color: #c62828;
            font-size: 14px;
            margin: 15px auto 0 auto;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        
        <!-- Elementos flutuando individualmente sobre o visor de vídeo -->
        <img id="mol-letreiro" class="elemento-junino" src="" alt="Letreiro">
        <img id="mol-bandeirinhas" class="elemento-junino" src="" alt="Bandeirinhas">
        <img id="mol-chapeu" class="elemento-junino" src="" alt="Chapéu">
        <img id="mol-cerca" class="elemento-junino" src="" alt="Cerca">
    </div>

    <button id="tirar-foto" disabled>📸 Abrindo câmera...</button>
    <div id="painel-status">Status: Inicializando sistema...</div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 Se o download direto falhar no iPhone, segure o dedo na foto e toque em "Salvar em Fotos".</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const painelStatus = document.getElementById('painel-status');

        // Mapeando os elementos individuais da tela
        const imgLetreiro = document.getElementById('mol-letreiro');
        const imgBandeirinhas = document.getElementById('mol-bandeirinhas');
        const imgChapeu = document.getElementById('mol-chapeu');
        const imgCerca = document.getElementById('mol-cerca');

        // --- 1. LISTA DE ELEMENTOS EM BASE64 ---
        // Converta suas artes individuais em texto em base64 e cole dentro das aspas abaixo:
        imgLetreiro.src = "data:image/png;base64,COLE_AQUI_O_LETREIRO_BASE64";
        imgBandeirinhas.src = "data:image/png;base64,COLE_AQUI_AS_BANDEIRINHAS_BASE64";
        imgChapeu.src = "data:image/png;base64,COLE_AQUI_O_CHAPEU_BASE64";
        imgCerca.src = "data:image/png;base64,COLE_AQUI_A_CERCA_E_FOGUEIRA_BASE64";
        // ---------------------------------------

        async function iniciarCamera() {
            const opcionais = [
                { video: { facingMode: "user" }, audio: false },
                { video: true, audio: false }
            ];

            let stream = null;
            for (let config of opcionais) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(config);
                    if (stream) break;
                } catch (e) {
                    console.log("Alternando foco...", e);
                }
            }

            if (stream) {
                try {
                    video.srcObject = stream;
                    video.play();
                    
                    painelStatus.innerHTML = "✅ Pronto! Os elementos juninos estão fixados sobre o visor.";
                    painelStatus.style.backgroundColor = "#e8f5e9";
                    painelStatus.style.color = "#2e7d32";
                    painelStatus.style.borderColor = "#a5d6a7";
                    
                    btnTirarFoto.disabled = false;
                    btnTirarFoto.innerHTML = "📸 Tirar Foto!";
                } catch (playErr) {
                    painelStatus.innerHTML = "Erro de vídeo: " + playErr.message;
                }
            } else {
                painelStatus.innerHTML = "⚠️ Ative as permissões de câmera do seu dispositivo.";
            }
        }

        window.addEventListener('load', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            const vw = video.videoWidth || video.clientWidth || 640;
            const vh = video.videoHeight || video.clientHeight || 480;

            // Define o canvas para o tamanho nativo do sensor da câmera do celular (Download sem perdas)
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, vw, vh);

            // 1. Tira a foto do rosto
            ctx.drawImage(video, 0, 0, vw, vh);

            // 2. Funde e carimba os elementos na foto do download respeitando as posições da tela
            // Letreiro (80% da largura, no topo)
            if (imgLetreiro.complete && imgLetreiro.naturalWidth > 0) {
                let larg = vw * 0.80;
                let alt = (imgLetreiro.naturalHeight / imgLetreiro.naturalWidth) * larg;
                ctx.drawImage(imgLetreiro, (vw - larg) / 2, vh * 0.03, larg, alt);
            }

            // Bandeirinhas (100% da largura, um pouco abaixo do letreiro)
            if (imgBandeirinhas.complete && imgBandeirinhas.naturalWidth > 0) {
                let alt = (imgBandeirinhas.naturalHeight / imgBandeirinhas.naturalWidth) * vw;
                ctx.drawImage(imgBandeirinhas, 0, vh * 0.15, vw, alt);
            }

            // Chapéu (Canto superior direito)
            if (imgChapeu.complete && imgChapeu.naturalWidth > 0) {
                let larg = vw * 0.16;
                let alt = (imgChapeu.naturalHeight / imgChapeu.naturalWidth) * larg;
                ctx.drawImage(imgChapeu, vw - larg - 10, vh * 0.01, larg, alt);
            }

            // Cerca com Fogueira (100% da largura, cravada na base inferior)
            if (imgCerca.complete && imgCerca.naturalWidth > 0) {
                let alt = (imgCerca.naturalHeight / imgCerca.naturalWidth) * vw;
                ctx.drawImage(imgCerca, 0, vh - alt, vw, alt);
            }

            // 3. Exporta para o resultado final
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                painelStatus.innerHTML = "Erro de buffer: " + e.message;
            }
        });
    </script>
</body>
</html>
