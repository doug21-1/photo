<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }

        /* Renderização direta da moldura sobre o vídeo */
        #moldura-oficial {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            object-fit: fill;
            display: block;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-ios {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #log-erro {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 12px;
            font-weight: bold;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <!-- A imagem puxa diretamente o arquivo local 'borda.png' -->
        <img id="moldura-oficial" src="borda.png" alt="Moldura Junina">
    </div>

    <button id="tirar-foto" disabled>⌛ Carregando Moldura...</button>
    <div id="log-erro"></div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-ios">💡 <b>No iPhone:</b> Toque e segure o dedo em cima da foto para clicar em <b>"Salvar em Fotos"</b>.</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const logErro = document.getElementById('log-erro');
        const imgMoldura = document.getElementById('moldura-oficial');

        // Alerta de protocolo de segurança essencial
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            logErro.innerHTML = "⚠️ Atenção: A câmera só funcionará se o site for publicado em um link seguro 'https://'.";
        }

        // Garante que o script espere a imagem borda.png carregar na memória do celular
        imgMoldura.onload = function() {
            btnTirarFoto.disabled = false;
            btnTirarFoto.innerHTML = "📸 Tirar Foto!";
        };

        // Tratamento caso o arquivo borda.png não seja encontrado na pasta
        imgMoldura.onerror = function() {
            logErro.innerHTML = "⚠️ Erro crítico: O arquivo 'borda.png' não foi encontrado na mesma pasta do index.html ou está corrompido.";
            btnTirarFoto.innerHTML = "Erro ao carregar moldura";
        };

        // Se a imagem já tiver carregado antes do script ler (cache), ativa o botão
        if (imgMoldura.complete) {
            btnTirarFoto.disabled = false;
            btnTirarFoto.innerHTML = "📸 Tirar Foto!";
        }

        async function iniciarCamera() {
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 1080 },
                    height: { ideal: 1440 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Não foi possível acessar a câmera. Verifique as permissões do seu navegador.";
            }
        }

        window.addEventListener('DOMContentLoaded', iniciarCamera);

        btnTirarFoto.addEventListener('click', () => {
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                alert("Aguarde a câmera iniciar completamente.");
                return;
            }

            // Define o tamanho matemático exato do canvas baseado no vídeo
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // 1. Captura a imagem da câmera de forma síncrona
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. Sobrepõe a imagem borda.png perfeitamente dimensionada
            if (imgMoldura.complete && imgMoldura.naturalWidth > 0) {
                context.drawImage(imgMoldura, 0, 0, canvas.width, canvas.height);
            }

            try {
                const dataUrl = canvas.toDataURL('image/png');
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;
                
                resultadoDiv.style.display = 'block';
                resultadoDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                logErro.innerHTML = "Erro ao processar imagem final: " + e.message;
            }
        });
    </script>
</body>
</html>
