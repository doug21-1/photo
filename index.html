<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6ª Festa Junina - Rua Emiliano Manojo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            background-color: #f7ebd3;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #d32f2f; margin: 10px 0 5px 0; font-size: 22px; font-weight: bold; }
        p.sub { color: #d84315; margin: 0 0 15px 0; font-weight: bold; font-size: 14px; }
        
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
            z-index: 1;
        }

        #moldura-visual {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            border: 18px solid #f57c00; 
            box-shadow: inset 0 0 0 5px #ffeb3b; 
        }

        .tag-topo {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #d32f2f;
            color: #fff;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            z-index: 12;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            border: 2px solid #ffeb3b;
        }

        button {
            background-color: #f57c00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            -webkit-appearance: none;
        }

        button:hover { background-color: #e64a19; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #canvas { display: none; }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        #foto-final {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .aviso-salvar {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding: 0 10px;
            line-height: 1.4;
        }

        #log-erro {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 12px;
            font-weight: bold;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h2>Festa Junina 🎉</h2>
    <p class="sub">Rua Emiliano Manojo - 6ª Edição</p>

    <div id="camera-container">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <div class="tag-topo">6ª EDIÇÃO 🌽 RUA EMILIANO MANOJO</div>
        <div id="moldura-visual"></div>
    </div>

    <button id="tirar-foto" disabled>📸 Tirar Foto!</button>
    <div id="log-erro"></div>

    <canvas id="canvas"></canvas>

    <div id="resultado">
        <h3>Sua foto ficou linda! 🌽</h3>
        <!-- A tag de imagem final que exibirá a junção perfeita da foto com a moldura -->
        <img id="foto-final" src="" alt="Foto Junina Finalizada">
        <p class="aviso-salvar">💡 Se o download automático falhar, segure o dedo em cima da foto para salvá-la direto na sua galeria.</p>
        <a id="baixar-foto" download="festa-junina-emiliano-manojo.png"><button>💾 Baixar Foto</button></a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnTirarFoto = document.getElementById('tirar-foto');
        const resultadoDiv = document.getElementById('resultado');
        const fotoFinal = document.getElementById('foto-final');
        const linkBaixar = document.getElementById('baixar-foto');
        const logErro = document.getElementById('log-erro');
        
        let imageCaptureTrack = null;

        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            logErro.innerHTML = "⚠️ Atenção: A câmera só funcionará se o site for publicado em um link seguro 'https://'.";
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                // Armazena a faixa de vídeo para captura direta de frames (Independente do Canvas)
                imageCaptureTrack = stream.getVideoTracks()[0];
                btnTirarFoto.disabled = false;
            } catch (err) {
                console.error(err);
                logErro.innerHTML = "Não foi possível acessar a câmera. Verifique as permissões de privacidade do seu navegador.";
                btnTirarFoto.disabled = true;
            }
        }

        window.addEventListener('load', () => {
            iniciarCamera();
        });

        // Evento de clique unificado usando ImageGrab assíncrono para ignorar a trava de segurança mobile
        btnTirarFoto.addEventListener('click', async () => {
            try {
                // Caso o navegador suporte a API de Captura Direta por Frame do Sensor (Android/Chrome recente)
                if (window.ImageCapture && imageCaptureTrack) {
                    const capture = new ImageCapture(imageCaptureTrack);
                    const bitmap = await capture.grabFrame();
                    processarFoto(bitmap, bitmap.width, bitmap.height);
                } else {
                    // Fallback adaptado para o Safari do iPhone usando congelamento instantâneo do buffer
                    const vw = video.videoWidth || 640;
                    const vh = video.videoHeight || 480;
                    processarFoto(video, vw, vh);
                }
            } catch (err) {
                console.error("Falha no método principal, tentando alternativa...", err);
                const vw = video.videoWidth || 640;
                const vh = video.videoHeight || 480;
                processarFoto(video, vw, vh);
            }
        });

        function processarFoto(origem, vw, vh) {
            // Define o canvas para o tamanho nativo do sensor da câmera do celular
            canvas.width = vw;
            canvas.height = vh;
            const ctx = canvas.getContext('2d');

            // Limpa o canvas antes do desenho para evitar conflitos de cache de cor
            ctx.clearRect(0, 0, vw, vh);

            // 1. Pinta o rosto da pessoa capturado do sensor
            ctx.drawImage(origem, 0, 0, vw, vh);

            // 2. Desenha a moldura geométrica por cima da foto de forma síncrona
            const espessuraBorda = Math.min(vw, vh) * 0.05;
            ctx.lineWidth = espessuraBorda;
            ctx.strokeStyle = "#f57c00";
            ctx.strokeRect(espessuraBorda / 2, espessuraBorda / 2, vw - espessuraBorda, vh - espessuraBorda);

            ctx.lineWidth = espessuraBorda * 0.2;
            ctx.strokeStyle = "#ffeb3b";
            ctx.strokeRect(espessuraBorda + (ctx.lineWidth / 2), espessuraBorda + (ctx.lineWidth / 2), vw - (espessuraBorda * 2) - ctx.lineWidth, vh - (espessuraBorda * 2) - ctx.lineWidth);

            // Placa do Letreiro Festivo
            const larguraPlaca = vw * 0.75;
            const alturaPlaca = vh * 0.07;
            const xPlaca = (vw - larguraPlaca) / 2;
            const yPlaca = vh * 0.06;

            ctx.fillStyle = "#d32f2f";
            ctx.fillRect(xPlaca, yPlaca, larguraPlaca, alturaPlaca);
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#ffeb3b";
            ctx.strokeRect(xPlaca, yPlaca, larguraPlaca, alturaPlaca);

            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${Math.floor(alturaPlaca * 0.45)}px -apple-system, BlinkMacSystemFont, Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("6ª EDIÇÃO 🌽 RUA EMILIANO MANOJO", vw / 2, yPlaca + (alturaPlaca / 2));

            // 3. Converte os dados brutos e atribui o link de download seguro
            try {
                const dataUrl = canvas.toDataURL("image/png");
                fotoFinal.src = dataUrl;
                linkBaixar.href = dataUrl;

                resultadoDiv.style.display = "block";
                resultadoDiv.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                console.error(e);
                logErro.innerHTML = "Erro de buffer de segurança do Canvas. Verifique se o site está rodando em HTTPS público.";
            }
        }
    </script>
</body>
</html>
